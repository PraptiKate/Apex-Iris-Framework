name: Auto-Generate Leaderboard Submission

on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install torch pandas numpy cryptography scikit-learn

    - name: Run Processing Script
      run: |
        python baseline.py
      env:
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}

    - name: Commit and Push Changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        git pull origin main --rebase
        git add submissions/ docs/
        
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Automated update for $SUBMITTER_NAME [skip ci]"
          git push origin main
        else
          echo "No changes detected"
        fi
      env:
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}