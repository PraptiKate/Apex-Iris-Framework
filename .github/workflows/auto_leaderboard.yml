name: Apex Leaderboard Automation

on:
  push:
    branches: [ main ]
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    if: github.event.pull_request.merged == true || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        pip install torch pandas scikit-learn numpy cryptography

    - name: Run Processing Script
      env:
        SUBMITTER_NAME: ${{ github.event.pull_request.user.login || github.actor }}
      run: |
        # --- SHIELD: Physically delete ghost folders in the runner ---
        # This makes it impossible for baseline.py to "see" them
        rm -rf submissions/Satyam_Anilrao_Shelke/
        rm -rf submissions/SatyamShelke2005/
        rm -rf submissions/Test_User_SatyamShelke2005/
        
        # Now run the script (ensure you've updated baseline.py with the filter too!)
        python baseline.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Add all changes, including the deletions we performed above
        git add -A
        
        # Sync with the remote. If there's a conflict, the runner's version (the clean one) wins.
        git pull origin main --strategy-option=theirs
        
        # Final check: Only commit if there is actually a difference
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Leaderboard Sync [skip ci]" && git push origin main)
